{% extends 'admin/base.html' %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<div class="max-w-md">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
    <h2 class="font-semibold text-slate-700 mb-4">Change Admin Password</h2>
    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">New Password</label>
        <div class="relative">
          <input type="password" name="new_password" id="new_password" placeholder="Enter new password" minlength="6"
                 class="w-full px-3 py-2.5 pr-10 rounded-lg border border-slate-200 focus:border-amber-400 focus:outline-none text-sm"/>
          <button type="button" onclick="togglePw()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-amber-600 transition p-1 rounded focus:outline-none"
                  tabindex="-1" aria-label="Toggle password visibility">
            <svg id="eye-on" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eye-off" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.053-3.333M6.343 6.343A9.965 9.965 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.516 2.985M6.343 6.343L3 3m3.343 3.343l11.314 11.314M3 3l18 18"/>
            </svg>
          </button>
        </div>
        <script>
        function togglePw() {
          const input  = document.getElementById('new_password');
          const eyeOn  = document.getElementById('eye-on');
          const eyeOff = document.getElementById('eye-off');
          const show   = input.type === 'password';
          input.type   = show ? 'text' : 'password';
          eyeOn.classList.toggle('hidden',  show);
          eyeOff.classList.toggle('hidden', !show);
        }
        </script>
      </div>
      <button type="submit" class="bg-amber-700 hover:bg-amber-600 text-white px-5 py-2 rounded-lg font-medium text-sm transition">
        Update Password
      </button>
    </form>
  </div>

  <div class="bg-amber-50 border border-amber-200 rounded-2xl p-5 mt-4 text-sm text-amber-800">
    <p class="font-semibold mb-1">ℹ️ Security Reminder</p>
    <p>Set a strong admin password and store it securely. The initial password is configured via the <code class="bg-amber-100 px-1.5 py-0.5 rounded font-mono">ADMIN_PASSWORD</code> environment variable.</p>
  </div>
</div>
{% endblock %}
